<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro | Referral Tracking</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .referral-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .growth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            padding: 1.5rem;
            border-radius: 20px;
        }

        .metric-title {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Outfit';
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .data-table th, .data-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border-glass);
            font-size: 0.9rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 700;
            color: var(--text-main);
        }

        .user-email {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-users logo-icon" style="color: var(--cyan);"></i>
                <span class="logo-text">Viral<span>Growth</span></span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li><a href="admin.html"><i class="fas fa-users-cog"></i> User Mgmt</a></li>
                    <li><a href="admin_analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a></li>
                    <li><a href="admin_revenue.html"><i class="fas fa-money-bill-trend-up"></i> Revenue</a></li>
                    <li class="active"><a href="#"><i class="fas fa-user-plus"></i> Referrals</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h3>Viral Referral Tracking</h3>
            </header>

            <div class="content-body">
                <div class="referral-grid">
                    <div class="growth-card">
                        <span class="metric-title">Total Referrals</span>
                        <div class="metric-value" id="val-total-refs">0</div>
                    </div>
                    <div class="growth-card">
                        <span class="metric-title">Total Bonus Issued</span>
                        <div class="metric-value" id="val-total-bonus" style="color: var(--success);">0</div>
                    </div>
                </div>

                <div class="growth-card">
                    <h3>Successful Referrals</h3>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Referrer</th>
                                    <th>Invited User</th>
                                    <th>Date</th>
                                    <th>Bonus Issued</th>
                                </tr>
                            </thead>
                            <tbody id="list-referrals">
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function loadReferrals() {
            try {
                const res = await fetch('/api/admin/referrals');
                if (!res.ok) {
                    window.location.href = 'dashboard.html';
                    return;
                }
                const data = await res.json();

                document.getElementById('val-total-refs').textContent = data.length;
                const totalBonus = data.reduce((sum, r) => sum + (r.rewardAmount || 0), 0);
                document.getElementById('val-total-bonus').textContent = totalBonus.toLocaleString();

                const list = document.getElementById('list-referrals');
                list.innerHTML = data.map(r => `
                    <tr>
                        <td>
                            <div class="user-info">
                                <span class="user-name">${r.referrerName}</span>
                                <span class="user-email">${r.referrerEmail}</span>
                            </div>
                        </td>
                        <td>
                            <div class="user-info">
                                <span class="user-name">${r.refereeName}</span>
                                <span class="user-email">${r.refereeEmail}</span>
                            </div>
                        </td>
                        <td>${new Date(r.timestamp).toLocaleDateString()}</td>
                        <td><span style="color: var(--success); font-weight: 700;">+${r.rewardAmount} Leads</span></td>
                    </tr>
                `).join('') || '<tr><td colspan="4" style="text-align:center;">No referrals recorded yet.</td></tr>';

            } catch (err) {
                console.error('Referral Load Error:', err);
            }
        }
        loadReferrals();
    </script>
</body>

</html>
