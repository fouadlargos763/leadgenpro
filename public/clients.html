<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro | Clients</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .client-notes { max-width: 14rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modal input/textarea shared style */
        .modal-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: var(--primary); }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-rocket logo-icon"></i>
                <span class="logo-text">LeadGen<span>Pro</span></span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/dashboard"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li class="active"><a href="/clients"><i class="fas fa-users"></i> Clients</a></li>
                    <li><a href="/campaigns"><i class="fas fa-bullhorn"></i> Campaigns</a></li>
                    <li><a href="/pipeline"><i class="fas fa-chart-line"></i> Pipeline</a></li>
                    <li><a href="/billing"><i class="fas fa-credit-card"></i> Billing</a></li>
                    <li id="nav-admin" style="display:none;"><a href="/admin.html" style="color: var(--gold);"><i class="fas fa-user-shield"></i> Admin</a></li>
                    <li><a href="/settings"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role" id="user-email" style="font-size:0.7rem; opacity:0.6;"></span>
                    </div>
                </div>
                <div style="margin-top:0.75rem; padding: 0 0.5rem;">
                    <button id="btn-logout"
                        style="width:100%; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; padding:0.5rem; border-radius:8px; font-size:0.8rem; cursor:pointer; transition:background 0.2s;">
                        <i class="fas fa-sign-out-alt" style="margin-right:5px;"></i> Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="clients-search" placeholder="Search clients by name, email, notes…" oninput="filterClients(this.value)">
                </div>
            </header>
            <div class="content-body">
                <section class="leads-section">
                    <div class="table-header">
                        <h3>All Clients / Contacts</h3>
                        <div class="table-filters">
                            <button id="btn-add-client" class="btn btn-primary" onclick="openAddClientModal()">
                                <i class="fas fa-plus"></i> Add Manual Client
                            </button>
                            <button id="btn-refresh-clients" class="btn btn-outline" onclick="refreshClients()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="clients-table">
                            <thead>
                                <tr>
                                    <th>Company Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Website</th>
                                    <th>Status</th>
                                    <th>Notes</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="clients-list">
                                <tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading clients…</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- ── EDIT CLIENT MODAL ──────────────────────────────────────────── -->
    <div id="client-edit-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 460px;">
            <div class="modal-header">
                <h3><i class="fas fa-edit" style="color: var(--primary); margin-right: 8px;"></i> Edit Client</h3>
                <button class="close-modal" onclick="closeClientModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-client-id">
                <input type="hidden" id="edit-client-file">

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="edit-client-email" class="modal-input" placeholder="contact@company.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="edit-client-phone" class="modal-input" placeholder="+1 555 000 0000">
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="edit-client-status" class="modal-input">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Replied">Replied</option>
                        <option value="Qualified">Qualified</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea id="edit-client-notes" class="modal-input" placeholder="Meeting notes, next steps…" rows="4" style="resize:vertical;"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" onclick="closeClientModal()" type="button">Cancel</button>
                <button id="btn-save-client-edit" class="btn btn-primary" onclick="saveClientEdit()" type="button">
                    <i class="fas fa-save"></i> Save
                </button>
            </div>
        </div>
    </div>

    <!-- ── ADD CLIENT MODAL ───────────────────────────────────────────── -->
    <div id="client-add-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 480px;">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus" style="color: var(--primary); margin-right: 8px;"></i> Add Manual Client</h3>
                <button class="close-modal" onclick="closeAddClientModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Company Name <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="add-client-name" class="modal-input" placeholder="Acme Corp">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="add-client-email" class="modal-input" placeholder="contact@acmecorp.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="add-client-phone" class="modal-input" placeholder="+1 555 000 0000">
                </div>
                <div class="form-group">
                    <label class="form-label">Website</label>
                    <input type="text" id="add-client-website" class="modal-input" placeholder="acmecorp.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="add-client-status" class="modal-input">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Replied">Replied</option>
                        <option value="Qualified">Qualified</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea id="add-client-notes" class="modal-input" placeholder="Initial notes about this client…" rows="3" style="resize:vertical;"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" onclick="closeAddClientModal()" type="button">Cancel</button>
                <button id="btn-create-client" class="btn btn-primary" onclick="submitAddClient()" type="button">
                    <i class="fas fa-user-plus"></i> Create Client
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="clients.js"></script>
    <script>
        // Refresh button with spin animation
        function refreshClients() {
            const btn = document.getElementById('btn-refresh-clients');
            if (btn) {
                const icon = btn.querySelector('i');
                if (icon) icon.style.animation = 'spin 0.8s linear infinite';
                loadClients().finally(() => {
                    if (icon) icon.style.animation = '';
                });
            } else {
                loadClients();
            }
        }
    </script>
</body>
</html>
