<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro | Clients Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .client-notes { max-width: 15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .editable { cursor: pointer; border-bottom: 1px dashed var(--text-muted); padding-bottom: 2px; }
        .editable:hover { color: var(--gold); border-bottom-color: var(--gold); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-rocket logo-icon"></i>
                <span class="logo-text">LeadGen<span>Pro</span></span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/dashboard"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li class="active"><a href="/clients"><i class="fas fa-users"></i> Clients</a></li>
                    <li><a href="/campaigns"><i class="fas fa-bullhorn"></i> Campaigns</a></li>
                    <li><a href="/pipeline"><i class="fas fa-chart-line"></i> Pipeline</a></li>
                    <li><a href="/billing"><i class="fas fa-credit-card"></i> Billing</a></li>
                    <li id="nav-admin" style="display:none;"><a href="/admin.html" style="color: var(--gold);"><i class="fas fa-user-shield"></i> Admin</a></li>
                    <li><a href="/settings"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role" id="user-email" style="font-size:0.7rem; opacity:0.6;"></span>
                    </div>
                </div>
                <div style="margin-top:0.75rem; padding: 0 0.5rem;">
                    <button id="btn-logout"
                        style="width:100%; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; padding:0.5rem; border-radius:8px; font-size:0.8rem; cursor:pointer; transition:background 0.2s;">
                        <i class="fas fa-sign-out-alt" style="margin-right:5px;"></i> Sign Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="clients-search" placeholder="Search clients..." oninput="filterClients(this.value)">
                </div>
            </header>
            <div class="content-body">
                <section class="leads-section">
                    <div class="table-header">
                        <h3>All Clients / Contacts</h3>
                        <div class="table-filters">
                            <button class="btn btn-primary" onclick="openAddClientModal()"><i class="fas fa-plus"></i> Add Manual Client</button>
                            <button class="btn btn-outline" onclick="loadClients()"><i class="fas fa-sync-alt"></i> Refresh</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="clients-table">
                            <thead>
                                <tr>
                                    <th>Company Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Website</th>
                                    <th>Status</th>
                                    <th>Notes</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="clients-list">
                                <!-- Loaded dynamically -->
                                <tr><td colspan="7" style="text-align: center;">Loading clients...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Client Edit Modal -->
    <div id="client-edit-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3><i class="fas fa-edit" style="color: var(--primary); margin-right: 8px;"></i> Edit Client</h3>
                <button class="close-modal" onclick="closeClientModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-client-id">
                <input type="hidden" id="edit-client-file">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Status</label>
                    <select id="edit-client-status" style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-main); outline: none;">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Replied">Replied</option>
                        <option value="Qualified">Qualified</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase;">Notes</label>
                    <textarea id="edit-client-notes" placeholder="Add meeting notes, next steps..." rows="4" style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); border-radius: 8px; color: var(--text-main); outline: none;"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn btn-secondary close-modal" onclick="closeClientModal()" type="button">Cancel</button>
                <button class="btn btn-primary" onclick="saveClientEdit()" type="button"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>
    <!-- Add Client Modal -->
    <div id="client-add-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus" style="color: var(--primary); margin-right: 8px;"></i> Add Manual Client</h3>
                <button class="close-modal" onclick="closeAddClientModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem;">Company Name</label>
                    <input type="text" id="add-client-name" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); border-radius: 8px; color: white;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem;">Email Address</label>
                    <input type="email" id="add-client-email" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); border-radius: 8px; color: white;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem;">Status</label>
                    <select id="add-client-status" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); border-radius: 8px; color: white;">
                        <option value="New">New</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Replied">Replied</option>
                        <option value="Qualified">Qualified</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary close-modal" onclick="closeAddClientModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitAddClient()">Create Client</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="clients.js"></script>
</body>
</html>
