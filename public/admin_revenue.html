<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro | Revenue Analytics</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .revenue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .revenue-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            padding: 2rem;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .revenue-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .revenue-card.mrr::before { background: var(--cyan); }
        .revenue-card.arr::before { background: var(--success); }
        .revenue-card.churn::before { background: #ff4757; }

        .card-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            display: block;
        }

        .card-value {
            font-size: 2.75rem;
            font-weight: 800;
            font-family: 'Outfit';
            color: #fff;
        }

        .card-sub {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .plan-distribution {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .distribution-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }

        .plan-name {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .plan-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .plan-count {
            font-weight: 700;
            font-family: 'Outfit';
            font-size: 1.2rem;
        }

        .bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-top: 2rem;
            display: flex;
            overflow: hidden;
        }

        .bar-segment { height: 100%; transition: width 0.5s ease; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-hand-holding-usd logo-icon" style="color: var(--success);"></i>
                <span class="logo-text">Revenue<span>Ops</span></span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li><a href="admin.html"><i class="fas fa-users-cog"></i> User Mgmt</a></li>
                    <li><a href="admin_analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a></li>
                    <li class="active"><a href="#"><i class="fas fa-money-bill-trend-up"></i> Revenue</a></li>
                    <li><a href="admin_referrals.html"><i class="fas fa-user-plus"></i> Referrals</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h3>SaaS Revenue Dashboard</h3>
            </header>

            <div class="content-body">
                <div class="revenue-grid">
                    <div class="revenue-card mrr">
                        <span class="card-label">Monthly Recurring Revenue</span>
                        <div class="card-value" id="val-mrr">$0</div>
                        <div class="card-sub" id="val-active-subs">0 Active Subscriptions</div>
                    </div>
                    <div class="revenue-card arr">
                        <span class="card-label">Annual Recurring Revenue</span>
                        <div class="card-value" id="val-arr">$0</div>
                        <div class="card-sub">Projected yearly revenue</div>
                    </div>
                    <div class="revenue-card churn">
                        <span class="card-label">Monthly Churn Rate</span>
                        <div class="card-value" id="val-churn">0%</div>
                        <div class="card-sub" id="val-cancellations">0 Cancellations (30d)</div>
                    </div>
                </div>

                <div class="revenue-card">
                    <h3 style="margin-bottom: 1.5rem;">Plan Distribution</h3>
                    <div class="bar-container" id="distribution-bar">
                        <!-- Segments added by JS -->
                    </div>
                    <div class="plan-distribution" id="distribution-list">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const colors = {
            free: '#a4b0be',
            basic: '#1e90ff',
            pro: '#2ed573',
            agency: '#ffa502'
        };

        async function loadRevenue() {
            try {
                const res = await fetch('/api/admin/revenue');
                if (!res.ok) {
                    window.location.href = 'dashboard.html';
                    return;
                }
                const data = await res.json();

                document.getElementById('val-mrr').textContent = `$${data.mrr.toLocaleString()}`;
                document.getElementById('val-arr').textContent = `$${data.arr.toLocaleString()}`;
                document.getElementById('val-active-subs').textContent = `${data.activeSubscriptions} Active Subscriptions`;
                document.getElementById('val-churn').textContent = `${data.churnRate}%`;
                document.getElementById('val-cancellations').textContent = `${data.cancellationsLast30Days} Cancellations (30d)`;

                const distList = document.getElementById('distribution-list');
                const distBar = document.getElementById('distribution-bar');
                distList.innerHTML = '';
                distBar.innerHTML = '';

                const total = Object.values(data.planDistribution).reduce((a, b) => a + b, 0);

                Object.entries(data.planDistribution).forEach(([plan, count]) => {
                    const pct = total > 0 ? (count / total * 100) : 0;
                    
                    // Add to list
                    distList.innerHTML += `
                        <div class="distribution-item">
                            <div class="plan-name">
                                <div class="plan-dot" style="background: ${colors[plan] || '#ccc'};"></div>
                                ${plan.charAt(0).toUpperCase() + plan.slice(1)} Plan
                            </div>
                            <div class="plan-count">${count} users (${pct.toFixed(1)}%)</div>
                        </div>
                    `;

                    // Add to bar
                    if (pct > 0) {
                        distBar.innerHTML += `<div class="bar-segment" style="width: ${pct}%; background: ${colors[plan] || '#ccc'};" title="${plan}: ${count}"></div>`;
                    }
                });

            } catch (err) {
                console.error('Revenue Load Error:', err);
            }
        }
        loadRevenue();
    </script>
</body>

</html>
