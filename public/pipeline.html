<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro | Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .kanban-board { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 2rem; height: calc(100vh - 120px); align-items: stretch; }
        .kanban-column { background: rgba(0,0,0,0.15); border: 1px solid var(--border-glass); border-radius: 12px; min-width: 300px; max-width: 320px; display: flex; flex-direction: column; }
        .kanban-header { font-weight: 600; text-transform: uppercase; font-size: 0.85rem; padding: 1rem; border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); }
        .kanban-body { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
        .kanban-card { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 8px; padding: 1rem; cursor: grab; transition: border-color 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kanban-card:active { cursor: grabbing; border-color: var(--cyan); }
        .kanban-card h4 { margin: 0 0 0.5rem 0; font-size: 1rem; color: var(--gold); }
        .kanban-card p { margin: 0; font-size: 0.8rem; color: var(--text-main); opacity: 0.8; }
        .kanban-card .contact { margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted); display:flex; flex-direction:column; gap:0.25rem; }
        .col-new .kanban-header { border-top: 3px solid var(--primary); }
        .col-contacted .kanban-header { border-top: 3px solid #f59e0b; }
        .col-replied .kanban-header { border-top: 3px solid var(--cyan); }
        .col-qualified .kanban-header { border-top: 3px solid var(--success); }
        .col-closed .kanban-header { border-top: 3px solid var(--danger); }
        .badge-count { background: rgba(255,255,255,0.1); padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-rocket logo-icon"></i>
                <span class="logo-text">LeadGen<span>Pro</span></span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="/dashboard"><i class="fas fa-th-large"></i> Dashboard</a></li>
                    <li><a href="/clients"><i class="fas fa-users"></i> Clients</a></li>
                    <li><a href="/campaigns"><i class="fas fa-bullhorn"></i> Campaigns</a></li>
                    <li class="active"><a href="/pipeline"><i class="fas fa-chart-line"></i> Pipeline</a></li>
                    <li><a href="/billing"><i class="fas fa-credit-card"></i> Billing</a></li>
                    <li id="nav-admin" style="display:none;"><a href="/admin.html" style="color: var(--gold);"><i class="fas fa-user-shield"></i> Admin</a></li>
                    <li><a href="/settings"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="user-name">Loading...</span>
                        <span class="user-role" id="user-email" style="font-size:0.7rem; opacity:0.6;"></span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header" style="justify-content: space-between;">
                <h2>Sales Pipeline</h2>
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="pipeline-search" placeholder="Search board..." oninput="renderPipeline()">
                </div>
            </header>
            <div class="content-body">
                <div class="kanban-board">
                    <div class="kanban-column col-new">
                        <div class="kanban-header">New Lead <span id="count-new" class="badge-count">0</span></div>
                        <div class="kanban-body dropzone" ondragover="allowDrop(event)" ondrop="drop(event, 'New')"></div>
                    </div>
                    <div class="kanban-column col-contacted">
                        <div class="kanban-header">Contacted <span id="count-contacted" class="badge-count">0</span></div>
                        <div class="kanban-body dropzone" ondragover="allowDrop(event)" ondrop="drop(event, 'Contacted')"></div>
                    </div>
                    <div class="kanban-column col-replied">
                        <div class="kanban-header">Replied <span id="count-replied" class="badge-count">0</span></div>
                        <div class="kanban-body dropzone" ondragover="allowDrop(event)" ondrop="drop(event, 'Replied')"></div>
                    </div>
                    <div class="kanban-column col-qualified">
                        <div class="kanban-header">Qualified <span id="count-qualified" class="badge-count">0</span></div>
                        <div class="kanban-body dropzone" ondragover="allowDrop(event)" ondrop="drop(event, 'Qualified')"></div>
                    </div>
                    <div class="kanban-column col-closed">
                        <div class="kanban-header">Closed <span id="count-closed" class="badge-count">0</span></div>
                        <div class="kanban-body dropzone" ondragover="allowDrop(event)" ondrop="drop(event, 'Closed')"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="pipeline.js"></script>
</body>
</html>
